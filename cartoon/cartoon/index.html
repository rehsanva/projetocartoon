<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom e Jerry</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body onload="bd()">

    <div class="container">
        <div class="main-cartoon">
            <div class="elemento-cartoon">
                <h1>Cadastro de Usuario</h1>
                <img src="img/tomejerry.png" alt="tomejerry" class="tom-cartoon">
            </div>
            <div class="form-cartoon">
                <input type="text" id="nome" placeholder="Insira seu nome" class="box-cartoon">
                <input type="text" id="login" placeholder="Insira seu login" class="box-cartoon">
                <input type="text" id="senha" placeholder="Insira sua senha" class="box-cartoon">
                <input type="text" id="email" placeholder="Insira seu email" class="box-cartoon">
                
                <div class="btn-cartoon">
                    <button type="button" onclick="adicionar()" class="botao-cartoon">Cadastrar</button>
                    <button type="button" class="botao-cartoon">Sair</button>
                </div>
                
            </div>
        </div>
    </div>

    
</body>
</html>
